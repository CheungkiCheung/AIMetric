version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aimetric-postgres
    environment:
      POSTGRES_DB: aimetric
      POSTGRES_USER: aimetric
      POSTGRES_PASSWORD: aimetric
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aimetric -d aimetric']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aimetric-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
